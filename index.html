<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PostBox - Admin Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <header class="header">
      <h1 class="logo">PostBox</h1>
      <p class="tagline">Admin Dashboard</p>
    </header>

    <main class="main">
      <div class="card" id="tokenCard">
        <h2 class="card-title">GitHub Token</h2>
        <form id="tokenForm" class="form">
          <div class="form-group">
            <label for="tokenInput" class="label">Enter your GitHub token</label>
            <input type="password" id="tokenInput" class="input" placeholder="ghp_xxx" required>
            <p class="help-text"><a href="https://github.com/settings/tokens/new?scopes=repo" target="_blank">Generate token here</a> (needs repo scope)</p>
          </div>
          <button type="submit" class="btn btn-primary">Save Token</button>
        </form>
      </div>

      <div class="card" id="postCard" style="display:none">
        <h2 class="card-title">Create New Post</h2>
        <form id="postForm" class="form">
          <div class="form-group">
            <label for="postContent" class="label">What's on your mind?</label>
            <textarea id="postContent" class="textarea" placeholder="Write something..." rows="4"></textarea>
          </div>
          <div class="form-group">
            <label class="label">Upload Image</label>
            <div class="upload-area" id="uploadArea">
              <input type="file" id="imageInput" class="file-input" accept="image/*">
              <div class="upload-content" id="uploadContent">
                <svg class="upload-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                <p class="upload-text">Click or drag image</p>
              </div>
              <img id="previewImage" class="preview-image" alt="Preview">
            </div>
          </div>
          <button type="submit" class="btn btn-primary" id="submitBtn"><span class="btn-text">Publish Post</span><span class="btn-loading">Publishing...</span></button>
        </form>
        <div class="status" id="status"></div>
      </div>

      <div class="card">
        <h2 class="card-title">Recent Posts</h2>
        <div id="recentPosts" class="recent-posts"><p class="no-posts">No posts yet</p></div>
      </div>
    </main>

    <footer class="footer">
      <p>PostBox &bull; <a href="https://animeshdinda12-netizen.github.io/StreamLog" target="_blank">View StreamLog</a></p>
    </footer>
  </div>
  <script src="app.js"></script>
</body>
</html>
